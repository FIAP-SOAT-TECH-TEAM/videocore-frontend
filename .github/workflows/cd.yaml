name: CD Pipeline

on:
  pull_request:
    types: [closed]
    branches:
      - main

permissions:
  id-token: write
  contents: read
  actions: read

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  
  TF_VAR_subscription_id: ${{secrets.AZURE_SUBSCRIPTION_ID}}
  TF_VAR_videocore-backend-resource-group: ${{secrets.BACKEND_AZURE_RESOURCE_GROUP_NAME}}
  TF_VAR_videocore-backend-storage-account: ${{secrets.BACKEND_AZURE_STORAGE_ACCOUNT_NAME}}
  TF_VAR_videocore-backend-container: ${{secrets.BACKEND_AZURE_STORAGE_ACCOUNT_CONTAINER_NAME}}
  TF_VAR_videocore-backend-infra-key: ${{secrets.VIDEOCORE_INFRA_BACKEND_AZURE_KEY}}

jobs:
  infra-info:
    runs-on: ubuntu-latest
    outputs:
      storage_account_name: ${{ steps.acr.outputs.storage_account_name }}
      resource_group_name: ${{ steps.acr.outputs.resource_group_name }}
      cloudfront_distribution_id: ${{ steps.acr.outputs.cloudfront_distribution_id }}
      aws_credentials: ${{ steps.acr.outputs.aws_credentials }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Login Azure
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="resource_group_name=${{secrets.BACKEND_AZURE_RESOURCE_GROUP_NAME}}" \
            -backend-config="storage_account_name=${{secrets.BACKEND_AZURE_STORAGE_ACCOUNT_NAME}}" \
            -backend-config="container_name=${{secrets.BACKEND_AZURE_STORAGE_ACCOUNT_CONTAINER_NAME}}" \
            -backend-config="subscription_id=${{secrets.AZURE_SUBSCRIPTION_ID}}" \
            -backend-config="key=${{secrets.BACKEND_AZURE_KEY}}"

      # Somente para que o output seja criado
      - name: Terraform Apply Refresh Only
        working-directory: terraform
        run: terraform apply --refresh-only --auto-approve

      - name: Define outputs
        id: acr
        working-directory: terraform
        run: | 
          echo "storage_account_name=$(terraform output -raw storage_account_name_from_remote)" >> $GITHUB_OUTPUT
          echo "resource_group_name=$(terraform output -raw resource_group_name_from_remote)" >> $GITHUB_OUTPUT
          echo "cloudfront_distribution_id=$(terraform output -raw cloudfront_distribution_id_from_remote)" >> $GITHUB_OUTPUT
          echo "aws_credentials=$(terraform output -raw aws_credentials_from_remote)" >> $GITHUB_OUTPUT
          
  deploy:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    needs: infra-info
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Download build artifact
        uses: dawidd6/action-download-artifact@v11
        with:
          name: nextjs-build
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: ci.yaml
          workflow_search: true
          check_artifacts: true
          name_is_regexp: false
          if_no_artifact_found: fail
          path: out

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Configure AWS CLI
        run: |
          mkdir -p ~/.aws
          echo "${{ needs.infra-info.outputs.aws_credentials }}" > ~/.aws/credentials

      - name: Upload to Blob Storage
        run: |
          az storage blob sync \
            --source out \
            --container '$web' \
            --account-name ${{ needs.infra-info.outputs.storage_account_name }} \
            --auth-mode login \
            --delete-destination true

      - name: Purge Cloud Front cache
        run: |
          aws cloudfront create-invalidation \
          --distribution-id ${{ needs.infra-info.outputs.cloudfront_distribution_id }} \
          --paths "/*"